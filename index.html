<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>TigarInfo</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Global Reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: #f3f3f3;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        /* Responsive padding: shrinks on small screens, expands on large */
        padding: clamp(40px, 10vh, 90px) 15px;
      }

      /* Main container */
      .container {
        width: 100%;
        max-width: 420px;
        text-align: center;
      }

      /* Blue circle */
      .logo {
        /* Fluid sizing for the logo */
        width: clamp(110px, 30vw, 140px);
        height: clamp(110px, 30vw, 140px);
        margin: auto;
        border-radius: 50%;
        background: linear-gradient(135deg, #1da1ff, #0066ff);
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        /* Fluid font size inside logo */
        font-size: clamp(24px, 6vw, 30px);
        font-weight: 800;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 102, 255, 0.25);
        line-height: 1.2;
      }

      /* Title */
      h1 {
        margin-top: clamp(20px, 5vw, 28px);
        /* Fluid typography: auto-adjusts based on screen width */
        font-size: clamp(32px, 8vw, 42px);
        font-weight: 800;
        color: #111;
      }

      /* Description */
      p {
        margin-top: clamp(10px, 3vw, 16px);
        font-size: clamp(16px, 4.5vw, 20px);
        line-height: 1.6;
        color: #222;
        font-weight: 500;
      }

      /* Telegram card (Button) */
      .telegram-card {
        margin-top: clamp(28px, 6vw, 38px);
        width: 100%;
        background: white;
        border-radius: 22px;
        padding: clamp(12px, 3vw, 16px);
        display: flex;
        align-items: center;
        box-shadow: 0 5px 18px rgba(0, 0, 0, 0.08);
        text-decoration: none;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      /* Button Hover & Active States for better User Experience */
      .telegram-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      }

      .telegram-card:active {
        transform: translateY(1px);
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
      }

      /* Telegram icon box */
      .telegram-icon {
        width: clamp(56px, 15vw, 72px);
        height: clamp(56px, 15vw, 72px);
        border-radius: clamp(14px, 4vw, 18px);
        background: #229ed9;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-shrink: 0;
      }

      .telegram-icon img {
        width: clamp(32px, 8vw, 42px);
      }

      /* Button text */
      .telegram-text {
        margin-left: clamp(14px, 4vw, 20px);
        text-align: left;
        color: #111;
        font-size: clamp(18px, 5.5vw, 24px);
        font-weight: 700;
        line-height: 1.2;
      }

      /* Small footer */
      .footer {
        margin-top: clamp(50px, 10vh, 80px);
        color: #777;
        font-size: 14px;
        line-height: 1.8;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- BLUE CIRCLE -->
      <div class="logo">Tigar<br />Info</div>

      <!-- TITLE -->
      <h1>Tigar Info ⚽</h1>

      <!-- DESCRIPTION -->
      <p>
        Za sljedeće dojave i najbolje kvote,<br />
        pridruži se našoj grupi koristeći link ispod! 📱
      </p>

      <!-- TELEGRAM BUTTON -->
      <a class="telegram-card" href="https://t.me/tigarinfo">
        <div class="telegram-icon">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg"
            alt="Telegram ikona"
          />
        </div>
        <div class="telegram-text">Pridruži se grupi! 🚀</div>
      </a>

      <!-- FOOTER -->
      <div class="footer">Tigar Info • Telegram Zajednica</div>
    </div>
  </body>
</html>
